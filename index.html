<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>神魔战场数值查询</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body { background: #0f172a; color: #e2e8f0; }
      .tab-active { background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f172a; font-weight: 700; }
      .tab-inactive { background: #1e293b; color: #94a3b8; }
      .tab-inactive:hover { background: #334155; color: #e2e8f0; }
      .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; }
      .stat-label { color: #94a3b8; font-size: 0.75rem; }
      .stat-value { color: #f1f5f9; font-weight: 600; }
      .stat-highlight { color: #fbbf24; }
      .entity-btn { transition: all 0.15s; }
      .entity-btn:hover { background: #334155; }
      .entity-btn.active { background: #1e40af; color: white; }
      select { background: #1e293b; border: 1px solid #475569; color: #e2e8f0; border-radius: 8px; padding: 6px 12px; }
      select:focus { outline: none; border-color: #f59e0b; }
      table { border-collapse: collapse; width: 100%; }
      th { background: #0f172a; color: #94a3b8; font-size: 0.75rem; text-transform: uppercase; padding: 8px 12px; text-align: left; border-bottom: 2px solid #334155; }
      td { padding: 8px 12px; border-bottom: 1px solid #1e293b; }
      tr:hover td { background: #1e293b; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: #0f172a; }
      ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
